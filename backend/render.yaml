services:
  - type: web
    name: noir-ai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_CORS_ORIGINS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CHROMA_HOST
        value: ""
    healthCheckPath: /health
    freePlan: true
